# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL tuning for 4 vCPU / 8 GB RAM
# Append these to /etc/postgresql/16/main/postgresql.conf  (or your version)
# Then: sudo systemctl restart postgresql
# ─────────────────────────────────────────────────────────────────────────────

# ── Memory ───────────────────────────────────────────────────────────────────
shared_buffers = '2GB'                  # 25% of RAM
effective_cache_size = '6GB'            # 75% of RAM (OS cache + PG buffers)
work_mem = '16MB'                       # per-sort/hash — careful: multiplied by active queries
maintenance_work_mem = '256MB'          # VACUUM / CREATE INDEX

# ── Write-Ahead Log ─────────────────────────────────────────────────────────
wal_buffers = '64MB'
min_wal_size = '512MB'
max_wal_size = '2GB'
checkpoint_completion_target = 0.9

# ── Connections ──────────────────────────────────────────────────────────────
max_connections = 200                   # API(80) + Chat(30) + admin/monitoring headroom
superuser_reserved_connections = 3

# ── Planner ──────────────────────────────────────────────────────────────────
random_page_cost = 1.1                  # SSD storage — almost same cost as sequential
effective_io_concurrency = 200          # SSD
default_statistics_target = 100

# ── Background writer ───────────────────────────────────────────────────────
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# ── Logging (optional — enable in early days, disable later) ────────────────
log_min_duration_statement = 500        # log queries > 500 ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

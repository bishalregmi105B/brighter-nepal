# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy for brighternepal.com (behind Cloudflare)
# 4 vCPU / 8 GB RAM VPS — optimised for ~3 000 concurrent users
#
# Layout:
#   brighternepal.com       → Next.js frontend
#   api.brighternepal.com   → Flask REST API
#   chat.brighternepal.com  → Flask-SocketIO WebSocket chat
#
# Cloudflare handles: public SSL, DDoS, CDN caching of static assets.
# This server uses a Cloudflare Origin Certificate (*.brighternepal.com).
# ─────────────────────────────────────────────────────────────────────────────

# ── Use real visitor IP from Cloudflare (not CF edge IP) ─────────────────────
# Cloudflare IPv4 ranges — keep updated: https://www.cloudflare.com/ips-v4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ── Rate-limiting zones (uses real visitor IP) ───────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;

# ── Upstream services ────────────────────────────────────────────────────────
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream flask_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream flask_chat {
    server 127.0.0.1:5001;
    keepalive 64;
}

# ── Shared SSL settings (reused via include) ─────────────────────────────────
# Cloudflare Origin Certificate — must cover *.brighternepal.com
# Generated at: Cloudflare → SSL/TLS → Origin Server → Create Certificate
#   Hostnames: brighternepal.com, *.brighternepal.com

# ─────────────────────────────────────────────────────────────────────────────
# Redirect all HTTP → HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name brighternepal.com www.brighternepal.com api.brighternepal.com chat.brighternepal.com;
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────────────────────────
# Redirect www → non-www
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.brighternepal.com;

    ssl_certificate     /etc/ssl/cloudflare/brighternepal.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/brighternepal.com.key;

    return 301 https://brighternepal.com$request_uri;
}

# ═════════════════════════════════════════════════════════════════════════════
# 1. FRONTEND — brighternepal.com → Next.js (:3000)
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name brighternepal.com;

    ssl_certificate     /etc/ssl/cloudflare/brighternepal.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/brighternepal.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript
               application/json application/javascript application/xml
               image/svg+xml font/woff2;

    client_max_body_size 10m;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Static assets — immutable long cache
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public files served directly from disk
    location /icons/ {
        alias /opt/brighternepal/brighter-nepal/public/icons/;
        expires 30d;
        access_log off;
    }

    location /csPlayer.css {
        alias /opt/brighternepal/brighter-nepal/public/csPlayer.css;
        expires 30d;
        access_log off;
    }

    location /csPlayer.js {
        alias /opt/brighternepal/brighter-nepal/public/csPlayer.js;
        expires 30d;
        access_log off;
    }

    # Everything else → Next.js SSR
    location / {
        proxy_pass http://nextjs;
        proxy_read_timeout 30s;
    }
}

# ═════════════════════════════════════════════════════════════════════════════
# 2. REST API — api.brighternepal.com → Flask (:5000)
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.brighternepal.com;

    ssl_certificate     /etc/ssl/cloudflare/brighternepal.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/brighternepal.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Gzip JSON responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types application/json;

    client_max_body_size 50m;          # PDF/image uploads
    client_body_timeout  30s;
    client_header_timeout 15s;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Auth endpoints — stricter rate limit
    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://flask_api;
        proxy_read_timeout 30s;
    }

    # Uploaded files — serve from disk, bypass Flask
    location /uploads/ {
        alias /opt/brighternepal/brighter-nepal-api/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # All API routes
    location / {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://flask_api;
        proxy_read_timeout 60s;
    }
}

# ═════════════════════════════════════════════════════════════════════════════
# 3. CHAT / WEBSOCKET — chat.brighternepal.com → Flask-SocketIO (:5001)
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.brighternepal.com;

    ssl_certificate     /etc/ssl/cloudflare/brighternepal.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/brighternepal.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 5m;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Socket.IO endpoint — WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://flask_chat;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;        # keep WS alive 24h
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Fallback (health check, etc.)
    location / {
        proxy_pass http://flask_chat;
        proxy_read_timeout 30s;
    }
}

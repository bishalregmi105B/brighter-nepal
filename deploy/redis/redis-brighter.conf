# ─────────────────────────────────────────────────────────────────────────────
# Redis tuning for 8 GB VPS — limit memory to 256 MB
# Save as /etc/redis/redis-brighter.conf  or append to /etc/redis/redis.conf
# ─────────────────────────────────────────────────────────────────────────────

maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — RDB snapshots (good enough for cache + chat history)
save 900 1
save 300 10
save 60 10000

# Disable AOF (we don't need strict durability — it's a cache)
appendonly no

# Connection limits
maxclients 1000
tcp-keepalive 300
timeout 300
